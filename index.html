<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktuelle Meldungen in Vorarlberg</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #f3f5f7;
      --muted: #aeb6c2;
      --accent: #ff4d3d;
      --line: rgba(255,255,255,0.08);
      --footer-h: 48px;
      --alert-space: 40px;
      --news-gap: 20px;
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr var(--footer-h);
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 22px 34px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
      position: relative;
      z-index: 2;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      width: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .logo {
      width: 10px;
      height: 42px;
      border-radius: 999px;
      background: var(--accent);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 1rem;
    }

    .weather-box {
      display: flex;
      align-items: stretch;
      gap: 12px;
      flex: 1 1 720px;
      min-width: 560px;
      max-width: 980px;
      margin-left: 24px;
      justify-content: flex-end;
      flex-wrap: nowrap;
    }

    .weather-box.hidden {
      display: none;
    }

    .weather-day {
      flex: 1 1 0;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      text-align: center;
    }

    .weather-dayname {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .weather-icon {
      margin-top: 8px;
      font-size: 1.6rem;
      line-height: 1;
    }

    .weather-temp {
      margin-top: 8px;
      font-size: 1.2rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .weather-desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.25;
    }

    .weather-alert {
      display: none;
      align-items: center;
      gap: 18px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #ee9a9a;
      color: #4a0f12;
      border: 1px solid rgba(74,15,18,0.12);
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
    }

    .weather-alert.docked {
      position: fixed;
      left: 28px;
      right: 28px;
      bottom: calc(var(--footer-h) + 16px);
      z-index: 15;
      max-height: min(24vh, 220px);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(74,15,18,0.4) rgba(255,255,255,0.15);
    }

    .weather-alert.visible {
      display: flex;
    }

    .weather-alert.level-green {
      background: rgba(62, 117, 73, 1);
      color: #d9f7df;
      border-color: rgba(62, 117, 73, 1);
    }

    .weather-alert-icon {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 3px solid currentColor;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1.4rem;
      flex: 0 0 auto;
    }

    .weather-alert-title {
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .weather-alert-time {
      font-size: 0.98rem;
      opacity: 0.95;
    }

    .weather-alert-text {
      margin-top: 4px;
      font-size: 0.98rem;
      line-height: 1.35;
    }

    main {
      overflow: hidden;
      position: relative;
      padding: 12px 26px 18px;
    }

    .cycle-marker-static {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 0 0 34px;
      padding: 10px 2px 6px;
      position: relative;
      z-index: 1;
      background: transparent;
    }

    .cycle-marker-static::before,
    .cycle-marker-static::after {
      content: '';
      flex: 1 1 auto;
      height: 3px;
      background: linear-gradient(90deg, rgba(255,77,61,0.15), rgba(255,77,61,0.95), rgba(255,77,61,0.15));
      border-radius: 999px;
    }

    .cycle-marker-static span {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.9rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .fade-top,
    .fade-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 54px;
      pointer-events: none;
      z-index: 3;
    }

    .fade-top {
      top: 0;
      background: linear-gradient(var(--bg), rgba(15,17,21,0));
    }

    .fade-bottom {
      bottom: 0;
      background: linear-gradient(rgba(15,17,21,0), var(--bg));
    }

    .viewport {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      padding-right: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 77, 61, 0.85) rgba(255,255,255,0.08);
      scroll-behavior: auto;
      overscroll-behavior: none;
    }

    .viewport::-webkit-scrollbar {
      width: 14px;
    }

    .viewport::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
    }

    .viewport::-webkit-scrollbar-thumb {
      background: rgba(255, 77, 61, 0.85);
      border-radius: 999px;
      border: 3px solid rgba(0,0,0,0);
      background-clip: padding-box;
    }

    .viewport::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 77, 61, 1);
      background-clip: padding-box;
    }

    .viewport-inner {
      min-height: 100%;
      padding-top: 34px;
      padding-bottom: calc(var(--alert-space) + 34px);
    }

    .ticker,
    .ticker-pass,
    .set {
      display: flex;
      flex-direction: column;
      gap: var(--news-gap);
    }

    .ticker {
      will-change: transform;
      padding-top: 8px;
      padding-bottom: var(--news-gap);
    }

    .cycle-marker {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 12px 2px 16px;
      margin-bottom: 18px;
    }

    .cycle-marker::before,
    .cycle-marker::after {
      content: '';
      flex: 1;
      height: 4px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
    }

    .cycle-marker span {
      color: #ffffff;
      background: rgba(255, 77, 61, 0.14);
      border: 1px solid rgba(255, 77, 61, 0.45);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .item {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      min-height: 156px;
    }

    .time {
      color: var(--muted);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
      padding-top: 6px;
    }

    .time-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
    }

    .badge-new {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(255, 77, 61, 0.22);
    }

    .content.with-image {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 18px;
      align-items: center;
    }

    .title {
      font-size: 1.95rem;
      line-height: 1.2;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .image-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status,
    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-size: 1.3rem;
      padding: 30px;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .service-band {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .service-band .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      flex: 0 0 auto;
      opacity: 0.9;
    }

    @media (max-width: 1400px) {
      .content.with-image { grid-template-columns: minmax(0, 1fr) 220px; }
      .title { font-size: 1.65rem; }
      .desc { font-size: 1rem; }
    }

    @media (max-width: 1200px) {
      h1 { font-size: 1.6rem; }
      .header-top { flex-direction: column; align-items: flex-start; }
      .weather-box { margin-left: 0; min-width: 0; max-width: none; width: 100%; justify-content: flex-start; }
      .item { grid-template-columns: 88px 1fr; }
      .content.with-image { grid-template-columns: 1fr; }
      .image-wrap { max-width: 360px; }
      .title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Aktuelle Meldungen in Vorarlberg</h1>
          <div class="sub" id="statusLine">Meldungen von heute</div>
        </div>
      </div>
      <div class="weather-box" id="weatherBox" aria-label="3-Tage-Wettertrend Feldkirch">
        <div class="weather-day"><div class="weather-dayname">Heute</div><div class="weather-icon">…</div><div class="weather-temp">-- / --</div><div class="weather-desc">Lade Wetter…</div></div>
        <div class="weather-day"><div class="weather-dayname">Morgen</div><div class="weather-icon">…</div><div class="weather-temp">-- / --</div><div class="weather-desc">Lade Wetter…</div></div>
        <div class="weather-day"><div class="weather-dayname">Trend</div><div class="weather-icon">…</div><div class="weather-temp">-- / --</div><div class="weather-desc">Lade Wetter…</div></div>
      </div>
    </div>
  </header>

  <main>
    <div class="fade-top"></div>
    <div class="fade-bottom"></div>
    <div class="viewport" id="viewport">
      <div class="viewport-inner" id="viewportInner">
        <div class="status">Lade aktuelle Meldungen …</div>
      </div>
    </div>
  </main>

  <div class="weather-alert docked" id="weatherAlert" aria-live="polite"></div>

  <footer>
    <div class="service-band">
      <span><strong>Quelle:</strong> ORF Vorarlberg RSS · GeoSphere Austria</span>
      <span class="dot"></span>
      <span id="serviceNow">--</span>
      <span class="dot"></span>
      <span id="updated">Aktualisierung läuft …</span>
    </div>
  </footer>

  <script>
    (() => {
      const CONFIG = {
        FEED_URL: 'https://rss.orf.at/vorarlberg.xml',
        REFRESH_MS: 5 * 60 * 1000,
        MAX_ITEMS: 30,
        SCROLL_PIXELS_PER_SECOND: 60,
        FIELDKIRCH_COORDS: { lat: 47.1533, lon: 9.82194 },
        WARNING_LOOKAHEAD_HOURS: 48,
        MIN_RED_BANNER_LEVEL: 2,
        FORCE_ALERT_HOTKEY: { ctrl: true, alt: true, key: 'w' }
      };

      CONFIG.GEOSPHERE_WEATHER_URL = `https://dataset.api.hub.geosphere.at/v1/timeseries/forecast/nwp-v1-1h-2500m?parameters=t2m&parameters=mxt2m&parameters=mnt2m&parameters=rr_acc&parameters=tcc&lat_lon=${CONFIG.FIELDKIRCH_COORDS.lat},${CONFIG.FIELDKIRCH_COORDS.lon}`;
      CONFIG.WARNING_URL = `https://warnungen.zamg.at/wsapp/api/getWarningsForCoords?lon=${CONFIG.FIELDKIRCH_COORDS.lon}&lat=${CONFIG.FIELDKIRCH_COORDS.lat}&lang=de`;

      const FALLBACK_ENDPOINTS = [
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://cors.isomorphic-git.org/${url}`
      ];

      const DOM = {
        viewport: document.getElementById('viewport'),
        viewportInner: document.getElementById('viewportInner'),
        updated: document.getElementById('updated'),
        statusLine: document.getElementById('statusLine'),
        serviceNow: document.getElementById('serviceNow'),
        weatherBox: document.getElementById('weatherBox'),
        weatherAlert: document.getElementById('weatherAlert')
      };

      const FORMATTERS = {
        itemTime: new Intl.DateTimeFormat('de-AT', { hour: '2-digit', minute: '2-digit' }),
        serviceNow: new Intl.DateTimeFormat('de-AT', {
          weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
        }),
        updated: new Intl.DateTimeFormat('de-AT', {
          day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
        }),
        warningRange: new Intl.DateTimeFormat('de-AT', {
          weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
        }),
        weekdayShort: new Intl.DateTimeFormat('de-AT', { weekday: 'short' })
      };

      const WEATHER_LABELS = {
        0: 'Sonnig',
        1: 'Meist sonnig',
        2: 'Teilweise sonnig',
        3: 'Bewölkt',
        45: 'Neblig',
        48: 'Raureifnebel',
        51: 'Nieselregen',
        53: 'Nieselregen',
        55: 'Nieselregen',
        56: 'Gefrierender Nieselregen',
        57: 'Gefrierender Nieselregen',
        61: 'Leichter Regen',
        63: 'Regen',
        65: 'Starker Regen',
        66: 'Gefrierender Regen',
        67: 'Gefrierender Regen',
        71: 'Leichter Schnee',
        73: 'Schnee',
        75: 'Starker Schnee',
        77: 'Schneekörner',
        80: 'Regenschauer',
        81: 'Regenschauer',
        82: 'Starke Schauer',
        85: 'Schneeschauer',
        86: 'Schneeschauer',
        95: 'Gewitter',
        96: 'Gewitter/Hagel',
        99: 'Gewitter/Hagel'
      };

      const WARNING_TYPE_LABELS = {
        1: 'Sturm',
        2: 'Regen',
        3: 'Schnee',
        4: 'Glatteis',
        5: 'Gewitter',
        6: 'Hitze',
        7: 'Kälte'
      };

      const WARNING_LEVEL_LABELS = {
        1: 'Gelb',
        2: 'Orange',
        3: 'Rot'
      };

      const STATE = {
        animationFrameId: null,
        lastFrameTs: null,
        forceWeatherAlert: false,
        latestOfficialWarnings: []
      };

      const rssParser = new DOMParser();
      const cycleMarkerTemplate = '<div class="cycle-marker-static" aria-label="Neueste Nachrichten"><span>Neueste Nachrichten</span></div>';
      const stripHelper = document.createElement('div');

      const setText = (el, text) => {
        if (el) el.textContent = text;
      };

      function escapeHtml(str = '') {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function stripHtml(html = '') {
        stripHelper.innerHTML = html;
        return (stripHelper.textContent || stripHelper.innerText || '').trim();
      }

      function extractImageFromDescription(html = '') {
        const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
        return match ? match[1] : '';
      }

      function formatItemTime(dateString) {
        const date = new Date(dateString);
        return Number.isNaN(date.getTime()) ? 'ORF' : FORMATTERS.itemTime.format(date);
      }

      function isRecent(dateString, hours = 2) {
        const date = new Date(dateString);
        return !Number.isNaN(date.getTime()) && (Date.now() - date.getTime()) <= hours * 60 * 60 * 1000;
      }

      function isToday(dateString) {
        const date = new Date(dateString);
        if (Number.isNaN(date.getTime())) return false;
        const now = new Date();
        return date.getFullYear() === now.getFullYear()
          && date.getMonth() === now.getMonth()
          && date.getDate() === now.getDate();
      }

      function updateServiceNow() {
        setText(DOM.serviceNow, FORMATTERS.serviceNow.format(new Date()));
      }

      function getWeatherIcon(code) {
        if (code === 0) return '☀️';
        if (code === 1 || code === 2) return '🌤️';
        if (code === 3) return '☁️';
        if (code === 45 || code === 48) return '🌫️';
        if ([51, 53, 55, 56, 57].includes(code)) return '🌦️';
        if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return '🌧️';
        if ([71, 73, 75, 77, 85, 86].includes(code)) return '🌨️';
        if ([95, 96, 99].includes(code)) return '⛈️';
        return '🌡️';
      }

      function getWeatherLabel(code) {
        return WEATHER_LABELS[Number(code)] || 'Wetter';
      }

      function formatWeatherDay(dateString, index) {
        const date = new Date(dateString);
        if (Number.isNaN(date.getTime())) {
          return index === 0 ? 'Heute' : index === 1 ? 'Morgen' : 'Trend';
        }
        return FORMATTERS.weekdayShort.format(date);
      }

      function hideWeather() {
        DOM.weatherBox?.classList.add('hidden');
      }

      function parseGeosphereDate(value) {
        if (!value) return null;
        const match = String(value).match(/(\d{2})\.(\d{2})\.(\d{4})\s+(\d{2}):(\d{2})/);
        if (!match) return null;
        const [, dd, mm, yyyy, hh, min] = match;
        return new Date(`${yyyy}-${mm}-${dd}T${hh}:${min}:00`);
      }

      function formatGeosphereRange(begin, end) {
        const start = parseGeosphereDate(begin);
        const finish = parseGeosphereDate(end);
        if (start && finish) return `${FORMATTERS.warningRange.format(start)} – ${FORMATTERS.warningRange.format(finish)}`;
        if (start) return FORMATTERS.warningRange.format(start);
        if (finish) return FORMATTERS.warningRange.format(finish);
        return 'Aktuell';
      }

      function getWarnTypeLabel(typeId) {
        return WARNING_TYPE_LABELS[Number(typeId)] || 'Warnung';
      }

      function getWarnLevelLabel(levelId) {
        return WARNING_LEVEL_LABELS[Number(levelId)] || 'Warnung';
      }

      function getWarningWindowed(warnings = STATE.latestOfficialWarnings, options = {}) {
        const { bypassLevel = false, bypassTime = false } = options;
        const now = Date.now();
        const futureCutoff = now + CONFIG.WARNING_LOOKAHEAD_HOURS * 60 * 60 * 1000;

        return warnings
          .filter(item => {
            const level = Number(item.warnstufeid || item.level || 0);
            const begin = parseGeosphereDate(item.begin)?.getTime() ?? null;
            const end = parseGeosphereDate(item.end)?.getTime() ?? null;
            const passesLevel = bypassLevel || level >= CONFIG.MIN_RED_BANNER_LEVEL;
            const passesTime = bypassTime || (
              (begin !== null && begin <= futureCutoff && (end === null || end >= now)) ||
              (begin === null && end !== null && end >= now)
            );
            return passesLevel && passesTime;
          })
          .sort((a, b) => {
            const levelDiff = Number(b.warnstufeid || 0) - Number(a.warnstufeid || 0);
            if (levelDiff !== 0) return levelDiff;
            const aStart = parseGeosphereDate(a.begin)?.getTime() || Number.MAX_SAFE_INTEGER;
            const bStart = parseGeosphereDate(b.begin)?.getTime() || Number.MAX_SAFE_INTEGER;
            return aStart - bStart;
          });
      }

      function getSyntheticGreenWarning() {
        const now = new Date();
        const end = new Date(now.getTime() + CONFIG.WARNING_LOOKAHEAD_HOURS * 60 * 60 * 1000);
        const pad = value => String(value).padStart(2, '0');
        const asGeo = date => `${pad(date.getDate())}.${pad(date.getMonth() + 1)}.${date.getFullYear()} ${pad(date.getHours())}:${pad(date.getMinutes())}`;

        return {
          warnstufeid: 0,
          warntypid: 0,
          begin: asGeo(now),
          end: asGeo(end),
          text: `Keine warnrelevanten GeoSphere-Meldungen innerhalb der nächsten ${CONFIG.WARNING_LOOKAHEAD_HOURS} Stunden.`,
          empfehlungen: 'Testmodus aktiv.'
        };
      }

      function buildWarningBannerContent(item, { forced = false } = {}) {
        const levelId = Number(item?.warnstufeid || 0);
        const levelText = levelId > 0 ? getWarnLevelLabel(levelId) : 'Grün';
        const title = `${levelText}-Wetterwarnung`;
        const timeText = item ? formatGeosphereRange(item.begin, item.end) : 'Per Tastenkombination aktiviert';
        const warnType = item ? getWarnTypeLabel(item.warntypid) : 'Hinweis';
        const detail = item?.auswirkungen || item?.text || item?.beschreibung || item?.shorttext || (forced
          ? 'Diese Meldung wird unabhängig vom aktuellen GeoSphere-Status eingeblendet.'
          : `${warnType} möglich.`);
        const recommendation = item?.empfehlungen || item?.recommendation || '';
        const forcedNote = forced ? ' • Testmodus' : '';

        return `
          <div class="weather-alert-icon">!</div>
          <div>
            <div class="weather-alert-title">${escapeHtml(title)}${forced ? ' <span style="font-weight:700; opacity:.8;">(Test)</span>' : ''}</div>
            <div class="weather-alert-time">${escapeHtml(timeText)}${forcedNote}</div>
            <div class="weather-alert-text">${escapeHtml(warnType)}: ${escapeHtml(detail)}${recommendation ? ` ${escapeHtml(recommendation)}` : ''}</div>
          </div>
        `;
      }

      function syncAlertSpacing() {
        if (!DOM.weatherAlert) return;
        const extraGap = 34;
        const height = DOM.weatherAlert.classList.contains('visible')
          ? DOM.weatherAlert.offsetHeight + extraGap
          : 28;
        document.documentElement.style.setProperty('--alert-space', `${height}px`);
      }

      function renderOfficialWarningBanner(warnings = STATE.latestOfficialWarnings) {
        if (!DOM.weatherAlert) return;

        const visibleWarnings = getWarningWindowed(warnings);
        const forcedWarnings = getWarningWindowed(warnings, { bypassLevel: true });

        DOM.weatherAlert.classList.remove('level-green');

        if (STATE.forceWeatherAlert) {
          const forcedItem = forcedWarnings[0] || getSyntheticGreenWarning();
          DOM.weatherAlert.innerHTML = buildWarningBannerContent(forcedItem, { forced: true });
          DOM.weatherAlert.classList.add('visible');

          if (Number(forcedItem?.warnstufeid || 0) < CONFIG.MIN_RED_BANNER_LEVEL) {
            DOM.weatherAlert.classList.add('level-green');
          }

          syncAlertSpacing();
          return;
        }

        if (!visibleWarnings.length) {
          DOM.weatherAlert.classList.remove('visible');
          DOM.weatherAlert.innerHTML = '';
          syncAlertSpacing();
          return;
        }

        DOM.weatherAlert.innerHTML = buildWarningBannerContent(visibleWarnings[0]);
        DOM.weatherAlert.classList.add('visible');
        syncAlertSpacing();
      }

      function extractArrayDeep(node, targetKey) {
        if (node == null) return null;

        if (Array.isArray(node)) {
          for (const entry of node) {
            const found = extractArrayDeep(entry, targetKey);
            if (found) return found;
          }
          return null;
        }

        if (typeof node !== 'object') return null;

        if (targetKey in node) {
          const value = node[targetKey];
          if (Array.isArray(value)) return value;
          if (value && typeof value === 'object') {
            if (Array.isArray(value.data)) return value.data;
            if (Array.isArray(value.values)) return value.values;
            if (Array.isArray(value.series)) return value.series;
          }
        }

        for (const value of Object.values(node)) {
          const found = extractArrayDeep(value, targetKey);
          if (found) return found;
        }

        return null;
      }

      function extractTimeSeriesDeep(node) {
        for (const key of ['timestamps', 'time', 'times', 'datetimes']) {
          const found = extractArrayDeep(node, key);
          if (Array.isArray(found) && found.length) return found;
        }
        return null;
      }

      function parseGeosphereWeatherPayload(data) {
        const times = extractTimeSeriesDeep(data) || [];
        const t2m = extractArrayDeep(data, 't2m') || [];
        const max2m = extractArrayDeep(data, 'mxt2m') || [];
        const min2m = extractArrayDeep(data, 'mnt2m') || [];
        const rrAcc = extractArrayDeep(data, 'rr_acc') || [];
        const tcc = extractArrayDeep(data, 'tcc') || [];

        if (!times.length || (!t2m.length && !max2m.length && !min2m.length)) {
          throw new Error('GeoSphere-Wetterdaten konnten nicht interpretiert werden.');
        }

        const rows = times
          .map((time, index) => ({
            time,
            date: String(time).slice(0, 10),
            t2m: Number(t2m[index]),
            max: Number(max2m[index]),
            min: Number(min2m[index]),
            rrAcc: Number(rrAcc[index]),
            tcc: Number(tcc[index])
          }))
          .filter(row => row.date && !Number.isNaN(new Date(row.time).getTime()));

        const grouped = new Map();
        for (const row of rows) {
          if (!grouped.has(row.date)) grouped.set(row.date, []);
          grouped.get(row.date).push(row);
        }

        const dayEntries = [...grouped.entries()]
          .slice(0, 3)
          .map(([date, entries]) => {
            const validTemps = entries.map(e => e.t2m).filter(Number.isFinite);
            const validMax = entries.map(e => e.max).filter(Number.isFinite);
            const validMin = entries.map(e => e.min).filter(Number.isFinite);
            const validCloud = entries.map(e => e.tcc).filter(Number.isFinite);
            const rrValues = entries.map(e => e.rrAcc).filter(Number.isFinite);

            const precipTotal = rrValues.length ? Math.max(0, rrValues[rrValues.length - 1] - rrValues[0]) : 0;
            const avgCloud = validCloud.length ? validCloud.reduce((sum, value) => sum + value, 0) / validCloud.length : NaN;
            const maxTemp = validMax.length ? Math.max(...validMax) : (validTemps.length ? Math.max(...validTemps) : NaN);
            const minTemp = validMin.length ? Math.min(...validMin) : (validTemps.length ? Math.min(...validTemps) : NaN);

            let code = 3;
            if (precipTotal >= 0.6) code = 61;
            else if (Number.isFinite(avgCloud) && avgCloud <= 25) code = 0;
            else if (Number.isFinite(avgCloud) && avgCloud <= 55) code = 2;

            return { date, max: maxTemp, min: minTemp, precip: precipTotal, cloud: avgCloud, code };
          })
          .filter(day => Number.isFinite(day.max) || Number.isFinite(day.min));

        if (!dayEntries.length) throw new Error('Keine GeoSphere-Tageswerte verfügbar.');
        return dayEntries;
      }

      function renderWeather(days) {
        if (!DOM.weatherBox) return;

        DOM.weatherBox.classList.remove('hidden');
        DOM.weatherBox.innerHTML = days.map((day, index) => `
          <div class="weather-day">
            <div class="weather-dayname">${escapeHtml(formatWeatherDay(day.date, index))}</div>
            <div class="weather-icon">${escapeHtml(getWeatherIcon(day.code))}</div>
            <div class="weather-temp">${Math.round(day.max)}° / ${Math.round(day.min)}°</div>
            <div class="weather-desc">${escapeHtml(getWeatherLabel(day.code))}</div>
          </div>
        `).join('');

        renderOfficialWarningBanner();
      }

      async function fetchWithFallback(url, responseType = 'text') {
        const readResponse = async response => {
          if (responseType === 'json') {
            const text = await response.text();
            return JSON.parse(text);
          }
          return response.text();
        };

        try {
          const direct = await fetch(url, { cache: 'no-store' });
          if (direct.ok) return await readResponse(direct);
        } catch (_) {}

        for (const makeUrl of FALLBACK_ENDPOINTS) {
          try {
            const response = await fetch(makeUrl(url), { cache: 'no-store' });
            if (!response.ok) continue;
            return await readResponse(response);
          } catch (_) {}
        }

        throw new Error('Ressource konnte nicht geladen werden.');
      }

      async function loadWeather() {
        try {
          const data = await fetchWithFallback(CONFIG.GEOSPHERE_WEATHER_URL, 'json');
          renderWeather(parseGeosphereWeatherPayload(data));
        } catch (_) {
          hideWeather();
        }
      }

      async function loadOfficialWarnings() {
        try {
          const data = await fetchWithFallback(CONFIG.WARNING_URL, 'json');
          STATE.latestOfficialWarnings = (data?.properties?.warnings || [])
            .map(item => item?.properties || item)
            .filter(Boolean);
        } catch (_) {
          STATE.latestOfficialWarnings = [];
        }

        renderOfficialWarningBanner();
      }

      function setupWarningHotkey() {
        window.addEventListener('keydown', event => {
          const matches = event.key.toLowerCase() === CONFIG.FORCE_ALERT_HOTKEY.key
            && event.ctrlKey === CONFIG.FORCE_ALERT_HOTKEY.ctrl
            && event.altKey === CONFIG.FORCE_ALERT_HOTKEY.alt;

          if (!matches) return;

          event.preventDefault();
          STATE.forceWeatherAlert = !STATE.forceWeatherAlert;
          renderOfficialWarningBanner();
        });
      }

      async function fetchFeedXml() {
        return fetchWithFallback(CONFIG.FEED_URL, 'text');
      }

      function parseRss(xmlText) {
        const xml = rssParser.parseFromString(xmlText, 'text/xml');
        if (xml.querySelector('parsererror')) {
          throw new Error('RSS konnte nicht gelesen werden.');
        }

        return [...xml.querySelectorAll('item')]
          .slice(0, CONFIG.MAX_ITEMS)
          .map(item => {
            const descriptionHtml = item.querySelector('description')?.textContent || '';
            const enclosureUrl = item.querySelector('enclosure[url]')?.getAttribute('url') || '';
            const mediaContent = item.getElementsByTagName('media:content')[0]?.getAttribute('url') || '';
            const mediaThumb = item.getElementsByTagName('media:thumbnail')[0]?.getAttribute('url') || '';
            const image = mediaContent || mediaThumb || enclosureUrl || extractImageFromDescription(descriptionHtml);

            return {
              title: item.querySelector('title')?.textContent?.trim() || 'Ohne Titel',
              description: stripHtml(descriptionHtml),
              pubDate: item.querySelector('pubDate')?.textContent?.trim() || '',
              link: item.querySelector('link')?.textContent?.trim() || '',
              image
            };
          })
          .filter(item => isToday(item.pubDate));
      }

      function stopAutoScroll() {
        if (STATE.animationFrameId) {
          cancelAnimationFrame(STATE.animationFrameId);
          STATE.animationFrameId = null;
        }
        STATE.lastFrameTs = null;
      }

      function getTicker() {
        return document.getElementById('ticker');
      }

      function recalcTickerResetPoint() {
        const ticker = getTicker();
        const firstPass = ticker?.firstElementChild;
        if (ticker && firstPass) {
          ticker.dataset.resetPoint = String(firstPass.offsetHeight || 0);
        }
      }

      function normalizeInfiniteScroll() {
        const ticker = getTicker();
        const resetPoint = Number(ticker?.dataset.resetPoint || 0);
        if (!resetPoint) return;

        if (DOM.viewport.scrollTop >= resetPoint) {
          DOM.viewport.scrollTop -= resetPoint;
        } else if (DOM.viewport.scrollTop < 0) {
          DOM.viewport.scrollTop += resetPoint;
        }
      }

      function startAutoScroll() {
        stopAutoScroll();
        recalcTickerResetPoint();

        const resetPoint = Number(getTicker()?.dataset.resetPoint || 0);
        if (resetPoint <= 0) return;

        const step = timestamp => {
          if (STATE.lastFrameTs == null) STATE.lastFrameTs = timestamp;
          const delta = (timestamp - STATE.lastFrameTs) / 1000;
          STATE.lastFrameTs = timestamp;

          DOM.viewport.scrollTop += CONFIG.SCROLL_PIXELS_PER_SECOND * delta;
          normalizeInfiniteScroll();
          STATE.animationFrameId = requestAnimationFrame(step);
        };

        STATE.animationFrameId = requestAnimationFrame(step);
      }

      function renderEmptyState(message) {
        stopAutoScroll();
        DOM.viewportInner.innerHTML = `<div class="empty">${message}</div>`;
        DOM.viewport.scrollTop = 0;
      }

      function renderItems(items) {
        stopAutoScroll();

        if (!items.length) {
          renderEmptyState('Heute bisher keine neuen Meldungen aus Vorarlberg.<br><br>Die Anzeige aktualisiert sich automatisch weiter.');
          return;
        }

        const singleItems = items.map(item => {
          const hasImage = Boolean(item.image);
          return `
            <article class="item">
              <div class="time-wrap">
                <div class="time">${escapeHtml(formatItemTime(item.pubDate))}</div>
                ${isRecent(item.pubDate) ? '<div class="badge-new">Neu</div>' : ''}
              </div>
              <div class="content${hasImage ? ' with-image' : ''}">
                <div>
                  <h2 class="title">${escapeHtml(item.title)}</h2>
                  <p class="desc">${escapeHtml(item.description || 'Aktuelle Meldung von ORF Vorarlberg')}</p>
                </div>
                ${hasImage ? `
                  <div class="image-wrap">
                    <img src="${escapeHtml(item.image)}" alt="Bild zur Meldung" loading="lazy" referrerpolicy="no-referrer" />
                  </div>
                ` : ''}
              </div>
            </article>
          `;
        }).join('');

        const singlePass = `<div class="ticker-pass">${cycleMarkerTemplate}${singleItems}</div>`;
        DOM.viewportInner.innerHTML = `<div class="ticker" id="ticker">${singlePass}${singlePass}</div>`;

        requestAnimationFrame(() => {
          recalcTickerResetPoint();
          DOM.viewport.scrollTop = 0;

          DOM.viewportInner.querySelectorAll('img').forEach(img => {
            if (img.complete) return;
            const refreshHeight = () => recalcTickerResetPoint();
            img.addEventListener('load', refreshHeight, { once: true });
            img.addEventListener('error', refreshHeight, { once: true });
          });

          startAutoScroll();
        });
      }

      async function loadFeed() {
        setText(DOM.statusLine, 'Meldungen von heute • Aktualisierung läuft …');

        if (!getTicker() && !DOM.viewportInner.querySelector('.empty')) {
          DOM.viewportInner.innerHTML = '<div class="status">Lade aktuelle Meldungen …</div>';
        }

        try {
          const xml = await fetchFeedXml();
          const items = parseRss(xml);
          renderItems(items);

          const updatedText = `Letzte Aktualisierung: ${FORMATTERS.updated.format(new Date())}`;
          setText(DOM.updated, updatedText);
          setText(DOM.statusLine, `Meldungen von heute • ${updatedText}`);
        } catch (error) {
          renderEmptyState(`Feed konnte nicht geladen werden.<br><br>${escapeHtml(error.message)}`);
          setText(DOM.updated, 'Letzter Abruf fehlgeschlagen');
          setText(DOM.statusLine, 'Meldungen von heute • Letzter Abruf fehlgeschlagen');
        }
      }

      function boot() {
        updateServiceNow();
        setupWarningHotkey();
        loadWeather();
        loadOfficialWarnings();
        loadFeed();

        window.addEventListener('resize', () => {
          syncAlertSpacing();
          recalcTickerResetPoint();
        });

        setInterval(updateServiceNow, 1000);
        setInterval(loadWeather, CONFIG.REFRESH_MS);
        setInterval(loadOfficialWarnings, CONFIG.REFRESH_MS);
        setInterval(loadFeed, CONFIG.REFRESH_MS);
      }

      boot();
    })();
  </script>
</body>
</html>
